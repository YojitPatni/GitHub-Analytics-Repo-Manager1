name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check Linting
        # This will only run if you have a "lint" script in package.json
        run: npm run lint || echo "No lint script found, skipping..."

      - name: Run Unit Tests
        # This will only run if you have a "test" script in package.json
        run: npm test || echo "No test script found, skipping..."